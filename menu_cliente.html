<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Menu Hotel Canguro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap');

:root {
  --nero: #111;
  --oro: #b8923a;
  --oro-light: #d4aa5a;
  --bg: #faf9f7;
  --bg2: #f2f0ec;
  --bordo: #e0dbd0;
  --testo: #2a2520;
  --testo2: #7a7060;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  font-family: 'Montserrat', sans-serif;
  color: var(--testo);
  min-height: 100vh;
}

/* HEADER */
.header {
  background: var(--nero);
  color: #fff;
  text-align: center;
  padding: 28px 20px 20px;
  position: relative;
}
.header::after {
  content: '';
  display: block;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--oro), transparent);
  margin-top: 16px;
}
.hotel-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 30px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #fff;
}
.hotel-sub {
  font-size: 9px;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--oro);
  margin-top: 4px;
}
.header-info {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin-top: 14px;
}
.info-chip {
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
}
.info-chip span {
  color: #fff;
  font-weight: 600;
  letter-spacing: 0.05em;
  display: block;
  font-size: 13px;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  margin-top: 2px;
}

/* STATO */
.stato-bar {
  background: var(--oro);
  color: #fff;
  text-align: center;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 8px;
  display: none;
}
.stato-bar.show { display: block; }

/* LOADING */
.loading {
  text-align: center;
  padding: 60px 20px;
  color: var(--testo2);
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}
.spinner {
  width: 32px; height: 32px;
  border: 2px solid var(--bordo);
  border-top-color: var(--oro);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ERRORE */
.error-box {
  margin: 24px 16px;
  background: #fff3cd;
  border: 1px solid #ffc107;
  border-radius: 6px;
  padding: 16px;
  font-size: 12px;
  color: #856404;
  text-align: center;
  display: none;
}
.error-box.show { display: block; }

/* CONTENT */
.content { padding: 0 0 100px; }

/* PASTO TAB */
.pasto-tabs {
  display: flex;
  border-bottom: 1px solid var(--bordo);
  background: #fff;
  position: sticky;
  top: 0;
  z-index: 10;
}
.pasto-tab {
  flex: 1;
  text-align: center;
  padding: 14px 8px;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--testo2);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
}
.pasto-tab.active {
  color: var(--nero);
  border-bottom-color: var(--oro);
}

.pasto-panel { display: none; }
.pasto-panel.active { display: block; }

/* SEZIONE */
.sezione {
  margin: 20px 16px 0;
}
.sezione-title {
  font-size: 9px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--oro);
  font-weight: 600;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--bordo);
  margin-bottom: 12px;
}

/* PIATTO CARD */
.piatto-card {
  background: #fff;
  border: 1px solid var(--bordo);
  border-radius: 8px;
  padding: 14px 16px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 14px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.piatto-card.selected {
  border-color: var(--oro);
  box-shadow: 0 0 0 1px var(--oro);
}
.piatto-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-style: italic;
  color: var(--oro);
  min-width: 20px;
  text-align: center;
  flex-shrink: 0;
}
.piatto-nome {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-weight: 600;
  color: var(--nero);
  flex: 1;
  line-height: 1.3;
}
.piatto-nome.vuoto {
  color: var(--bordo);
  font-style: italic;
  font-weight: 300;
}

/* STEPPER */
.stepper {
  display: flex;
  align-items: center;
  gap: 0;
  flex-shrink: 0;
}
.step-btn {
  width: 32px; height: 32px;
  border: 1px solid var(--bordo);
  background: #fff;
  color: var(--testo);
  font-size: 18px;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  border-radius: 0;
  -webkit-tap-highlight-color: transparent;
}
.step-btn:first-child { border-radius: 4px 0 0 4px; }
.step-btn:last-child  { border-radius: 0 4px 4px 0; }
.step-btn:active { background: var(--bg2); }
.step-btn.plus:active { background: var(--oro); color: #fff; border-color: var(--oro); }
.step-val {
  width: 36px; height: 32px;
  border-top: 1px solid var(--bordo);
  border-bottom: 1px solid var(--bordo);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 600;
  color: var(--nero);
  background: #fff;
}

/* VARIAZIONE */
.var-section {
  margin: 16px 16px 0;
}
.var-label {
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--testo2);
  margin-bottom: 6px;
}
.var-input {
  width: 100%;
  border: 1px solid var(--bordo);
  border-radius: 6px;
  padding: 10px 12px;
  font-family: 'Montserrat', sans-serif;
  font-size: 13px;
  color: var(--testo);
  background: #fff;
  outline: none;
  resize: none;
  height: 60px;
}
.var-input:focus { border-color: var(--oro); }

/* RIEPILOGO */
.riepilogo {
  margin: 24px 16px 0;
  background: var(--bg2);
  border-radius: 8px;
  padding: 14px 16px;
}
.riepilogo-title {
  font-size: 9px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--testo2);
  margin-bottom: 10px;
}
.riepilogo-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  padding: 3px 0;
  color: var(--testo);
}
.riepilogo-row .nome { font-family: 'Cormorant Garamond', serif; font-size: 15px; }
.riepilogo-row .qty  { font-weight: 600; color: var(--oro); }
.riepilogo-vuoto { font-size: 11px; color: var(--testo2); text-align: center; padding: 8px 0; letter-spacing: 0.1em; }

/* BOTTONE CONFERMA */
.footer-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: #fff;
  border-top: 1px solid var(--bordo);
  padding: 12px 16px;
  z-index: 20;
}
.btn-conferma {
  width: 100%;
  background: var(--nero);
  color: #fff;
  border: none;
  padding: 16px;
  font-family: 'Montserrat', sans-serif;
  font-size: 11px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 6px;
  transition: background 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.btn-conferma:active { background: #333; }
.btn-conferma:disabled { background: var(--bordo); color: var(--testo2); cursor: default; }
.btn-conferma.oro { background: var(--oro); }

/* SUCCESSO */
.successo-page {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: calc(100vh - 120px);
  padding: 40px 24px;
  text-align: center;
}
.successo-page.show { display: flex; }
.successo-icon {
  font-size: 60px;
  margin-bottom: 20px;
}
.successo-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px;
  font-weight: 600;
  color: var(--nero);
  margin-bottom: 10px;
}
.successo-sub {
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--testo2);
  line-height: 1.8;
}
.btn-modifica {
  margin-top: 28px;
  background: none;
  border: 1px solid var(--bordo);
  padding: 12px 24px;
  font-family: 'Montserrat', sans-serif;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--testo2);
  cursor: pointer;
  border-radius: 6px;
}

/* GIORNO CHIUSO */
.chiuso-page {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: calc(100vh - 120px);
  padding: 40px 24px;
  text-align: center;
}
.chiuso-page.show { display: flex; }
</style>
</head>
<body>

<!-- FIREBASE SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, get, set, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ── CONFIGURAZIONE ──────────────────────────────────────────
// Copia le tue credenziali Firebase qui sotto
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyC40uKHHAG4HjBzRZdVdRqLyxDDKjELM0g",
  authDomain: "hotel-canguro.firebaseapp.com",
  databaseURL: "https://hotel-canguro-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "hotel-canguro",
  storageBucket: "hotel-canguro.firebasestorage.app",
  messagingSenderId: "790068611588",
  appId: "1:790068611588:web:5189509820eddc7d59c351"
};
// ────────────────────────────────────────────────────────────

// Legge ?cam= dall'URL
const params   = new URLSearchParams(location.search);
const camera   = params.get('cam') || '???';
const pasto    = params.get('pasto') || 'pranzo'; // pranzo | cena

const app = initializeApp(FIREBASE_CONFIG);
const db  = getDatabase(app);

// Stato locale
let menu      = null;
let comanda   = {};
let confermata = false;

// Helper data
function dataOggi() {
  const d = new Date();
  return d.toISOString().split('T')[0];
}
function fmtData(v) {
  if (!v) return '—';
  const [y, m, d] = v.split('-');
  const G = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
  const M = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  const dt = new Date(y, parseInt(m)-1, parseInt(d));
  return `${G[dt.getDay()]} ${parseInt(d)} ${M[parseInt(m)-1]} ${y}`;
}

// ── RENDER ───────────────────────────────────────────────────

function renderMenu() {
  document.getElementById('loading').style.display = 'none';

  // data
  document.getElementById('data-label').textContent = fmtData(menu?.data || dataOggi());
  document.getElementById('camera-label').textContent = camera;

  const pastoParts = ['pranzo', 'cena'];
  pastoParts.forEach(p => {
    const panel = document.getElementById('panel-' + p);
    panel.innerHTML = '';

    // Primi
    const sezPrimi = document.createElement('div');
    sezPrimi.className = 'sezione';
    sezPrimi.innerHTML = '<div class="sezione-title">Primi piatti</div>';
    ['p1','p2','p3'].forEach((k, i) => {
      const nome = menu?.[p + '_p' + (i+1)] || '';
      sezPrimi.appendChild(buildCard(p, 'p' + (i+1), nome, i+1));
    });
    panel.appendChild(sezPrimi);

    // Secondi
    const sezSecondi = document.createElement('div');
    sezSecondi.className = 'sezione';
    sezSecondi.style.marginTop = '20px';
    sezSecondi.innerHTML = '<div class="sezione-title">Secondi piatti</div>';
    ['s1','s2','s3'].forEach((k, i) => {
      const nome = menu?.[p + '_s' + (i+1)] || '';
      sezSecondi.appendChild(buildCard(p, 's' + (i+1), nome, i+1));
    });
    panel.appendChild(sezSecondi);

    // Variazione
    const varSec = document.createElement('div');
    varSec.className = 'var-section';
    varSec.innerHTML = `
      <div class="var-label">Variazioni / note</div>
      <textarea class="var-input" id="var-${p}" placeholder="Es. senza glutine, allergie, preferenze..."
        oninput="window._aggiornaRiepilogo('${p}')">${comanda[p]?.var || ''}</textarea>`;
    panel.appendChild(varSec);

    // Riepilogo
    const riepilogoDiv = document.createElement('div');
    riepilogoDiv.className = 'riepilogo';
    riepilogoDiv.id = 'riepilogo-' + p;
    panel.appendChild(riepilogoDiv);

    aggiornaRiepilogo(p);
  });

  document.getElementById('content').style.display = 'block';
  document.getElementById('footer-bar').style.display = 'block';

  // Se già confermata oggi
  const dataKey = (menu?.data || dataOggi()).replace(/-/g,'');
  const refCom = ref(db, `comande/${dataKey}/${camera}`);
  get(refCom).then(snap => {
    if (snap.exists()) {
      const saved = snap.val();
      confermata = saved.confermata || false;
      if (confermata) {
        mostraSuccesso(true);
      } else {
        // Ripristina valori
        comanda = saved;
        renderValori();
      }
    }
  });
}

function buildCard(pasto, key, nome, num) {
  const div = document.createElement('div');
  div.className = 'piatto-card' + (nome ? '' : ' disabled');
  div.id = `card-${pasto}-${key}`;

  const qty = comanda[pasto]?.[key] || 0;

  div.innerHTML = `
    <div class="piatto-num">${num}</div>
    <div class="piatto-nome${!nome ? ' vuoto' : ''}">${nome || 'Non disponibile'}</div>
    <div class="stepper">
      <button class="step-btn minus" onclick="window._step('${pasto}','${key}',-1)" ${!nome?'disabled':''}>−</button>
      <div class="step-val" id="val-${pasto}-${key}">${qty}</div>
      <button class="step-btn plus" onclick="window._step('${pasto}','${key}',+1)" ${!nome?'disabled':''}>+</button>
    </div>`;

  if (qty > 0) div.classList.add('selected');
  return div;
}

function renderValori() {
  ['pranzo','cena'].forEach(p => {
    ['p1','p2','p3','s1','s2','s3'].forEach(k => {
      const el = document.getElementById(`val-${p}-${k}`);
      if (el) { el.textContent = comanda[p]?.[k] || 0; }
      const card = document.getElementById(`card-${p}-${k}`);
      if (card) {
        if ((comanda[p]?.[k] || 0) > 0) card.classList.add('selected');
        else card.classList.remove('selected');
      }
    });
    const ta = document.getElementById('var-' + p);
    if (ta) ta.value = comanda[p]?.var || '';
    aggiornaRiepilogo(p);
  });
}

function aggiornaRiepilogo(p) {
  const div = document.getElementById('riepilogo-' + p);
  if (!div) return;
  const nomi = {
    p1: menu?.[p+'_p1'], p2: menu?.[p+'_p2'], p3: menu?.[p+'_p3'],
    s1: menu?.[p+'_s1'], s2: menu?.[p+'_s2'], s3: menu?.[p+'_s3']
  };
  const rows = Object.entries(nomi)
    .filter(([k, n]) => n && (comanda[p]?.[k] || 0) > 0)
    .map(([k, n]) => `<div class="riepilogo-row"><span class="nome">${n}</span><span class="qty">×${comanda[p][k]}</span></div>`)
    .join('');

  const varNote = document.getElementById('var-' + p)?.value || '';
  const varRow = varNote ? `<div class="riepilogo-row" style="margin-top:6px;color:var(--testo2);font-size:11px;"><span>Note:</span><span style="text-align:right;max-width:60%">${varNote}</span></div>` : '';

  div.innerHTML = `<div class="riepilogo-title">Riepilogo ${p}</div>` +
    (rows ? rows + varRow : '<div class="riepilogo-vuoto">Nessun piatto selezionato</div>');
}

// Esponi funzioni globali (chiamate da onclick inline)
window._step = function(p, k, delta) {
  if (!comanda[p]) comanda[p] = {};
  comanda[p][k] = Math.max(0, (comanda[p][k] || 0) + delta);
  const el = document.getElementById(`val-${p}-${k}`);
  if (el) el.textContent = comanda[p][k];
  const card = document.getElementById(`card-${p}-${k}`);
  if (card) {
    if (comanda[p][k] > 0) card.classList.add('selected');
    else card.classList.remove('selected');
  }
  aggiornaRiepilogo(p);
};

window._aggiornaRiepilogo = function(p) { aggiornaRiepilogo(p); };

window._conferma = async function() {
  const btn = document.getElementById('btn-conferma');
  btn.disabled = true;
  btn.textContent = 'Invio in corso...';

  // Raccoglie note variazione
  ['pranzo','cena'].forEach(p => {
    const ta = document.getElementById('var-' + p);
    if (!comanda[p]) comanda[p] = {};
    comanda[p].var = ta?.value || '';
  });

  const dataKey = (menu?.data || dataOggi()).replace(/-/g,'');
  const payload = {
    camera,
    data: menu?.data || dataOggi(),
    pranzo: comanda.pranzo || {},
    cena:   comanda.cena   || {},
    timestamp: Date.now(),
    confermata: true
  };

  try {
    await set(ref(db, `comande/${dataKey}/${camera}`), payload);
    mostraSuccesso(false);
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Conferma comanda';
    alert('Errore di rete. Riprova.');
  }
};

window._modifica = function() {
  document.getElementById('successo').classList.remove('show');
  document.getElementById('content').style.display = 'block';
  document.getElementById('footer-bar').style.display = 'block';
  confermata = false;
  const btn = document.getElementById('btn-conferma');
  btn.disabled = false;
  btn.textContent = 'Aggiorna comanda';
  btn.classList.add('oro');
};

function mostraSuccesso(gia) {
  document.getElementById('content').style.display = 'none';
  document.getElementById('footer-bar').style.display = 'none';
  document.getElementById('successo').classList.add('show');
  document.getElementById('successo-msg').textContent = gia
    ? 'Comanda già inviata per oggi.'
    : 'La tua comanda è stata inviata alla cucina.';
}

function showPasto(p) {
  document.querySelectorAll('.pasto-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.pasto-panel').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + p).classList.add('active');
  document.getElementById('panel-' + p).classList.add('active');
}
window._showPasto = showPasto;

// ── INIT ────────────────────────────────────────────────────
async function init() {
  const snap = await get(ref(db, 'menu_oggi'));
  if (snap.exists()) {
    menu = snap.val();
  }
  renderMenu();
  showPasto('pranzo');
}

init().catch(e => {
  document.getElementById('loading').style.display = 'none';
  const err = document.getElementById('error-box');
  err.textContent = 'Impossibile caricare il menu. Verifica la connessione.';
  err.classList.add('show');
  console.error(e);
});

</script>

<!-- HEADER -->
<div class="header">
  <div class="hotel-name">Hotel Canguro</div>
  <div class="hotel-sub">Ristorante &amp; Soggiorno</div>
  <div class="header-info">
    <div class="info-chip">Camera<span id="camera-label">—</span></div>
    <div class="info-chip">Data<span id="data-label">—</span></div>
  </div>
</div>

<div id="loading" class="loading">
  <div class="spinner"></div>
  Caricamento menu...
</div>

<div class="error-box" id="error-box"></div>

<!-- CONTENT -->
<div id="content" style="display:none">
  <div class="pasto-tabs">
    <div class="pasto-tab active" id="tab-pranzo" onclick="window._showPasto('pranzo')">🍽 Pranzo</div>
    <div class="pasto-tab" id="tab-cena" onclick="window._showPasto('cena')">🌙 Cena</div>
  </div>

  <div class="pasto-panel active" id="panel-pranzo"></div>
  <div class="pasto-panel" id="panel-cena"></div>
</div>

<!-- SUCCESSO -->
<div class="successo-page" id="successo">
  <div class="successo-icon">✅</div>
  <div class="successo-title">Grazie!</div>
  <div class="successo-sub" id="successo-msg">La tua comanda è stata inviata alla cucina.</div>
  <button class="btn-modifica" onclick="window._modifica()">Modifica comanda</button>
</div>

<!-- FOOTER -->
<div class="footer-bar" id="footer-bar" style="display:none">
  <button class="btn-conferma" id="btn-conferma" onclick="window._conferma()">
    Conferma comanda
  </button>
</div>

</body>
</html>
