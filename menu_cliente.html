<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Menu Hotel Canguro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap');

:root {
  --nero: #111;
  --oro: #b8923a;
  --oro-light: #d4aa5a;
  --bg: #faf9f7;
  --bg2: #f2f0ec;
  --bordo: #e0dbd0;
  --testo: #2a2520;
  --testo2: #7a7060;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  font-family: 'Montserrat', sans-serif;
  color: var(--testo);
  min-height: 100vh;
}

/* HEADER */
.header {
  background: var(--nero);
  color: #fff;
  text-align: center;
  padding: 28px 20px 20px;
  position: relative;
}
.header::after {
  content: '';
  display: block;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--oro), transparent);
  margin-top: 16px;
}
.hotel-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 30px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #fff;
}
.hotel-sub {
  font-size: 9px;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--oro);
  margin-top: 4px;
}
.header-info {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin-top: 14px;
}
.info-chip {
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
}
.info-chip span {
  color: #fff;
  font-weight: 600;
  letter-spacing: 0.05em;
  display: block;
  font-size: 13px;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  margin-top: 2px;
}

/* STATO */
.stato-bar {
  background: var(--oro);
  color: #fff;
  text-align: center;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 8px;
  display: none;
}
.stato-bar.show { display: block; }

/* LOADING */
.loading {
  text-align: center;
  padding: 60px 20px;
  color: var(--testo2);
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}
.spinner {
  width: 32px; height: 32px;
  border: 2px solid var(--bordo);
  border-top-color: var(--oro);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ERRORE */
.error-box {
  margin: 24px 16px;
  background: #fff3cd;
  border: 1px solid #ffc107;
  border-radius: 6px;
  padding: 16px;
  font-size: 12px;
  color: #856404;
  text-align: center;
  display: none;
}
.error-box.show { display: block; }

/* CONTENT */
.content { padding: 0 0 100px; }

/* PASTO TAB */
.pasto-tabs {
  display: flex;
  border-bottom: 1px solid var(--bordo);
  background: #fff;
  position: sticky;
  top: 0;
  z-index: 10;
}
.pasto-tab {
  flex: 1;
  text-align: center;
  padding: 14px 8px;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--testo2);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
}
.pasto-tab.active {
  color: var(--nero);
  border-bottom-color: var(--oro);
}

.pasto-panel { display: none; }
.pasto-panel.active { display: block; }

/* SEZIONE */
.sezione {
  margin: 20px 16px 0;
}
.sezione-title {
  font-size: 9px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--oro);
  font-weight: 600;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--bordo);
  margin-bottom: 12px;
}

/* PIATTO CARD */
.piatto-card {
  background: #fff;
  border: 1px solid var(--bordo);
  border-radius: 8px;
  padding: 14px 16px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 14px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.piatto-card.selected {
  border-color: var(--oro);
  box-shadow: 0 0 0 1px var(--oro);
}
.piatto-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-style: italic;
  color: var(--oro);
  min-width: 20px;
  text-align: center;
  flex-shrink: 0;
}
.piatto-nome {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-weight: 600;
  color: var(--nero);
  flex: 1;
  line-height: 1.3;
}
.piatto-nome.vuoto {
  color: var(--bordo);
  font-style: italic;
  font-weight: 300;
}

/* STEPPER */
.stepper {
  display: flex;
  align-items: center;
  gap: 0;
  flex-shrink: 0;
}
.step-btn {
  width: 32px; height: 32px;
  border: 1px solid var(--bordo);
  background: #fff;
  color: var(--testo);
  font-size: 18px;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  border-radius: 0;
  -webkit-tap-highlight-color: transparent;
}
.step-btn:first-child { border-radius: 4px 0 0 4px; }
.step-btn:last-child  { border-radius: 0 4px 4px 0; }
.step-btn:active { background: var(--bg2); }
.step-btn.plus:active { background: var(--oro); color: #fff; border-color: var(--oro); }
.step-val {
  width: 36px; height: 32px;
  border-top: 1px solid var(--bordo);
  border-bottom: 1px solid var(--bordo);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 600;
  color: var(--nero);
  background: #fff;
}

/* SUB-STEPPER SENZA GLUTINE */
.gf-row {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 7px;
  padding-top: 7px;
  border-top: 1px dashed var(--bordo);
}
.gf-label {
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--testo2);
  flex: 1;
  text-align: right;
}
.gf-label span {
  display: inline-block;
  background: #f0f7ee;
  color: #4a7c3f;
  border: 1px solid #b8d9b2;
  border-radius: 3px;
  padding: 1px 5px;
  font-size: 8px;
  letter-spacing: 0.08em;
  font-weight: 600;
  margin-right: 4px;
}
.stepper.gf .step-btn {
  width: 26px; height: 26px;
  font-size: 15px;
  border-color: #b8d9b2;
  color: #4a7c3f;
}
.stepper.gf .step-val {
  width: 28px; height: 26px;
  font-size: 13px;
  border-color: #b8d9b2;
  color: #4a7c3f;
}
.stepper.gf .step-btn:active { background: #d4ecd0; }
  margin: 16px 16px 0;
}
.var-label {
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--testo2);
  margin-bottom: 6px;
}
.var-input {
  width: 100%;
  border: 1px solid var(--bordo);
  border-radius: 6px;
  padding: 10px 12px;
  font-family: 'Montserrat', sans-serif;
  font-size: 13px;
  color: var(--testo);
  background: #fff;
  outline: none;
  resize: none;
  height: 60px;
}
.var-input:focus { border-color: var(--oro); }

/* RIEPILOGO */
.riepilogo {
  margin: 24px 16px 0;
  background: var(--bg2);
  border-radius: 8px;
  padding: 14px 16px;
}
.riepilogo-title {
  font-size: 9px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--testo2);
  margin-bottom: 10px;
}
.riepilogo-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  padding: 3px 0;
  color: var(--testo);
}
.riepilogo-row .nome { font-family: 'Cormorant Garamond', serif; font-size: 15px; }
.riepilogo-row .qty  { font-weight: 600; color: var(--oro); }
.riepilogo-vuoto { font-size: 11px; color: var(--testo2); text-align: center; padding: 8px 0; letter-spacing: 0.1em; }

/* BOTTONE CONFERMA */
.footer-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: #fff;
  border-top: 1px solid var(--bordo);
  padding: 12px 16px;
  z-index: 20;
}
.btn-conferma {
  width: 100%;
  background: var(--nero);
  color: #fff;
  border: none;
  padding: 16px;
  font-family: 'Montserrat', sans-serif;
  font-size: 11px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 6px;
  transition: background 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.btn-conferma:active { background: #333; }
.btn-conferma:disabled { background: var(--bordo); color: var(--testo2); cursor: default; }
.btn-conferma.oro { background: var(--oro); }

/* POPUP RIEPILOGO */
.popup-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 100;
  display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
.popup-overlay.show { opacity: 1; pointer-events: all; }
.popup-box {
  background: var(--bg);
  width: 100%;
  border-radius: 16px 16px 0 0;
  padding: 20px 20px 32px;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
  max-height: 85vh;
  overflow-y: auto;
}
.popup-overlay.show .popup-box { transform: translateY(0); }
.popup-handle {
  width: 40px; height: 4px; background: var(--bordo);
  border-radius: 2px; margin: 0 auto 16px;
}
.popup-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px; font-weight: 600;
  color: var(--nero); margin-bottom: 16px;
  text-align: center;
}
.popup-section {
  font-size: 9px; letter-spacing: 0.25em;
  text-transform: uppercase; color: var(--oro);
  font-weight: 600; margin: 14px 0 8px;
  border-bottom: 1px solid var(--bordo);
  padding-bottom: 6px;
}
.popup-row {
  display: flex; justify-content: space-between;
  align-items: center; padding: 6px 0;
  border-bottom: 1px solid var(--bordo);
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px; color: var(--nero);
}
.popup-row .qty { font-weight: 700; color: var(--oro); }
.popup-gf { font-size: 11px; color: #4a7c3f; margin-left: 6px; }
.popup-empty { font-size: 12px; color: var(--testo2); text-align: center; padding: 8px 0; }
.popup-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
.btn-conferma-ok {
  width: 100%; background: var(--nero); color: #fff;
  border: none; padding: 16px;
  font-family: 'Montserrat', sans-serif; font-size: 11px;
  letter-spacing: 0.25em; text-transform: uppercase;
  cursor: pointer; border-radius: 6px;
}
.btn-torna {
  width: 100%; background: none; color: var(--testo2);
  border: 1px solid var(--bordo); padding: 12px;
  font-family: 'Montserrat', sans-serif; font-size: 11px;
  letter-spacing: 0.15em; text-transform: uppercase;
  cursor: pointer; border-radius: 6px;
}
.successo-page {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: calc(100vh - 120px);
  padding: 40px 24px;
  text-align: center;
}
.successo-page.show { display: flex; }
.successo-icon {
  font-size: 60px;
  margin-bottom: 20px;
}
.successo-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px;
  font-weight: 600;
  color: var(--nero);
  margin-bottom: 10px;
}
.successo-sub {
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--testo2);
  line-height: 1.8;
}
.btn-modifica {
  margin-top: 28px;
  background: none;
  border: 1px solid var(--bordo);
  padding: 12px 24px;
  font-family: 'Montserrat', sans-serif;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--testo2);
  cursor: pointer;
  border-radius: 6px;
}

/* GIORNO CHIUSO */
.chiuso-page {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: calc(100vh - 120px);
  padding: 40px 24px;
  text-align: center;
}
.chiuso-page.show { display: flex; }
</style>
</head>
<body>

<!-- FIREBASE SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, get, set, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ── CONFIGURAZIONE ──────────────────────────────────────────
// Copia le tue credenziali Firebase qui sotto
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyC40uKHHAG4HjBzRZdVdRqLyxDDKjELM0g",
  authDomain:        "hotel-canguro.firebaseapp.com",
  databaseURL:       "https://hotel-canguro-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "hotel-canguro",
  storageBucket:     "hotel-canguro.firebasestorage.app",
  messagingSenderId: "790068611588",
  appId:             "1:790068611588:web:5189509820eddc7d59c351"
};
// ────────────────────────────────────────────────────────────

// Legge ?cam= dall'URL
const params   = new URLSearchParams(location.search);
const camera   = params.get('cam') || '???';
const pasto    = params.get('pasto') || 'pranzo'; // pranzo | cena

const app = initializeApp(FIREBASE_CONFIG);
const db  = getDatabase(app);

// Stato locale
let menu      = null;
let comanda   = {};
let confermata = false;

// Helper data
function dataOggi() {
  const d = new Date();
  return d.toISOString().split('T')[0];
}
function fmtData(v) {
  if (!v) return '—';
  const [y, m, d] = v.split('-');
  const G = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
  const M = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  const dt = new Date(y, parseInt(m)-1, parseInt(d));
  return `${G[dt.getDay()]} ${parseInt(d)} ${M[parseInt(m)-1]} ${y}`;
}

// ── RENDER ───────────────────────────────────────────────────

function renderMenu() {
  document.getElementById('loading').style.display = 'none';

  // data
  document.getElementById('data-label').textContent = fmtData(menu?.data || dataOggi());
  document.getElementById('camera-label').textContent = camera;

  const pastoParts = ['pranzo', 'cena'];
  pastoParts.forEach(p => {
    const panel = document.getElementById('panel-' + p);
    panel.innerHTML = '';

    // Primi
    const sezPrimi = document.createElement('div');
    sezPrimi.className = 'sezione';
    sezPrimi.innerHTML = '<div class="sezione-title">Primi piatti</div>';
    ['p1','p2','p3'].forEach((k, i) => {
      const nome = menu?.[p + '_p' + (i+1)] || '';
      sezPrimi.appendChild(buildCard(p, 'p' + (i+1), nome, i+1));
    });
    panel.appendChild(sezPrimi);

    // Secondi
    const sezSecondi = document.createElement('div');
    sezSecondi.className = 'sezione';
    sezSecondi.style.marginTop = '20px';
    sezSecondi.innerHTML = '<div class="sezione-title">Secondi piatti</div>';
    ['s1','s2','s3'].forEach((k, i) => {
      const nome = menu?.[p + '_s' + (i+1)] || '';
      sezSecondi.appendChild(buildCard(p, 's' + (i+1), nome, i+1));
    });
    panel.appendChild(sezSecondi);

    // Variazioni — lista dall'archivio, menu a tendina + stepper, max 2
    const varList = menu?.variazioni || [];
    if (varList.length > 0) {
      const sezVar = document.createElement('div');
      sezVar.className = 'sezione';
      sezVar.style.marginTop = '20px';
      sezVar.innerHTML = '<div class="sezione-title">Variazioni</div>';
      [1, 2].forEach(num => {
        sezVar.appendChild(buildCardVar(p, num, varList));
      });
      panel.appendChild(sezVar);
    }

    // Riepilogo
    const riepilogoDiv = document.createElement('div');
    riepilogoDiv.className = 'riepilogo';
    riepilogoDiv.id = 'riepilogo-' + p;
    panel.appendChild(riepilogoDiv);

    aggiornaRiepilogo(p);
  });

  document.getElementById('content').style.display = 'block';
  document.getElementById('footer-bar').style.display = 'block';

  // Se già confermata oggi — ascolta anche sblocchi futuri dal gestionale
  const dataKey = (menu?.data || dataOggi()).replace(/-/g,'');
  const refCom = ref(db, `comande/${dataKey}/${camera}`);
  onValue(refCom, snap => {
    if (!snap.exists()) return;
    const saved = snap.val();
    const eraConfermata = confermata;
    confermata = saved.confermata === true;
    if (confermata && !eraConfermata) {
      // appena confermata
    } else if (!confermata && eraConfermata) {
      // sbloccata dal gestionale — riapri il menu
      document.getElementById('successo').classList.remove('show');
      document.getElementById('content').style.display = 'block';
      document.getElementById('footer-bar').style.display = 'block';
      comanda = saved;
      renderValori();
      const btn = document.getElementById('btn-conferma');
      btn.disabled = false;
      btn.textContent = 'Aggiorna comanda';
      btn.classList.add('oro');
    } else if (confermata && eraConfermata === false) {
      mostraSuccesso(true);
    }
    if (!eraConfermata && confermata === false && snap.exists()) {
      // Prima visita — non ancora confermata
      comanda = saved;
      renderValori();
    }
  });
}

function buildCard(pasto, key, nome, num) {
  const div = document.createElement('div');
  div.className = 'piatto-card' + (nome ? '' : ' disabled');
  div.id = `card-${pasto}-${key}`;

  const qty   = comanda[pasto]?.[key]    || 0;
  const qtyGf = comanda[pasto]?.[key+'_gf'] || 0;
  const dis   = !nome ? 'disabled' : '';

  div.innerHTML = `
    <div class="piatto-num">${num}</div>
    <div style="flex:1;min-width:0">
      <div class="piatto-nome${!nome ? ' vuoto' : ''}">${nome || 'Non disponibile'}</div>
      ${nome ? `
      <div class="gf-row">
        <div class="gf-label"><span>🌾✗ GF</span>di cui senza glutine</div>
        <div class="stepper gf">
          <button class="step-btn minus" onclick="window._stepGf('${pasto}','${key}',-1)" ${dis}>−</button>
          <div class="step-val" id="val-${pasto}-${key}-gf">${qtyGf}</div>
          <button class="step-btn plus" onclick="window._stepGf('${pasto}','${key}',+1)" ${dis}>+</button>
        </div>
      </div>` : ''}
    </div>
    <div class="stepper">
      <button class="step-btn minus" onclick="window._step('${pasto}','${key}',-1)" ${dis}>−</button>
      <div class="step-val" id="val-${pasto}-${key}">${qty}</div>
      <button class="step-btn plus" onclick="window._step('${pasto}','${key}',+1)" ${dis}>+</button>
    </div>`;

  if (qty > 0) div.classList.add('selected');
  return div;
}

function buildCardVar(pasto, num, varList) {
  const div = document.createElement('div');
  div.className = 'piatto-card';
  div.id = `card-${pasto}-v${num}`;

  const scelta = comanda[pasto]?.[`v${num}_nome`] || '';
  const qty    = comanda[pasto]?.[`v${num}`]      || 0;
  if (qty > 0) div.classList.add('selected');

  // Opzioni select
  const opzioni = varList.map(v =>
    `<option value="${v}" ${v === scelta ? 'selected' : ''}>${v}</option>`
  ).join('');

  div.innerHTML = `
    <div style="flex:1;min-width:0">
      <select id="sel-${pasto}-v${num}" style="width:100%;border:1px solid var(--bordo);padding:6px 8px;font-family:'Montserrat',sans-serif;font-size:12px;color:var(--testo);background:#fff;outline:none;border-radius:4px;margin-bottom:4px;"
        onchange="window._scegliVar('${pasto}',${num},this.value)">
        <option value="">— Scegli variazione —</option>
        ${opzioni}
      </select>
    </div>
    <div class="stepper" style="margin-left:10px">
      <button class="step-btn minus" onclick="window._step('${pasto}','v${num}',-1)">−</button>
      <div class="step-val" id="val-${pasto}-v${num}">${qty}</div>
      <button class="step-btn plus" onclick="window._step('${pasto}','v${num}',+1)">+</button>
    </div>`;

  return div;
}

function renderValori() {
  ['pranzo','cena'].forEach(p => {
    ['p1','p2','p3','s1','s2','s3','v1','v2'].forEach(k => {
      const el = document.getElementById(`val-${p}-${k}`);
      if (el) el.textContent = comanda[p]?.[k] || 0;
      const elGf = document.getElementById(`val-${p}-${k}-gf`);
      if (elGf) elGf.textContent = comanda[p]?.[k+'_gf'] || 0;
      const card = document.getElementById(`card-${p}-${k}`);
      if (card) {
        if ((comanda[p]?.[k] || 0) > 0) card.classList.add('selected');
        else card.classList.remove('selected');
      }
    });
    aggiornaRiepilogo(p);
  });
}

function aggiornaRiepilogo(p) {
  const div = document.getElementById('riepilogo-' + p);
  if (!div) return;
  const nomi = {
    p1: menu?.[p+'_p1'], p2: menu?.[p+'_p2'], p3: menu?.[p+'_p3'],
    s1: menu?.[p+'_s1'], s2: menu?.[p+'_s2'], s3: menu?.[p+'_s3'],
    v1: comanda[p]?.v1_nome, v2: comanda[p]?.v2_nome
  };
  const rows = Object.entries(nomi)
    .filter(([k, n]) => n && (comanda[p]?.[k] || 0) > 0)
    .map(([k, n]) => {
      const qty   = comanda[p][k];
      const qtyGf = comanda[p]?.[k+'_gf'] || 0;
      const gfTag = qtyGf > 0 ? ` <span style="font-size:10px;color:#4a7c3f">(${qtyGf} GF)</span>` : '';
      return `<div class="riepilogo-row"><span class="nome">${n}${gfTag}</span><span class="qty">×${qty}</span></div>`;
    }).join('');
  div.innerHTML = `<div class="riepilogo-title">Riepilogo ${p}</div>` +
    (rows ? rows : '<div class="riepilogo-vuoto">Nessun piatto selezionato</div>');
}

// ── POPUP RIEPILOGO ──────────────────────────────────────────
window._apriPopup = function() {
  const body = document.getElementById('popup-body');
  let html = '';
  ['pranzo','cena'].forEach(p => {
    const nomi = {
      p1: menu?.[p+'_p1'], p2: menu?.[p+'_p2'], p3: menu?.[p+'_p3'],
      s1: menu?.[p+'_s1'], s2: menu?.[p+'_s2'], s3: menu?.[p+'_s3'],
      v1: comanda[p]?.v1_nome, v2: comanda[p]?.v2_nome
    };
    const righe = Object.entries(nomi)
      .filter(([k,n]) => n && (comanda[p]?.[k]||0) > 0)
      .map(([k,n]) => {
        const qty = comanda[p][k];
        const gf  = comanda[p]?.[k+'_gf'] || 0;
        const gfTag = gf > 0 ? `<span class="popup-gf">(${gf} GF)</span>` : '';
        return `<div class="popup-row"><span>${n}${gfTag}</span><span class="qty">×${qty}</span></div>`;
      }).join('');
    html += `<div class="popup-section">${p.charAt(0).toUpperCase()+p.slice(1)}</div>`;
    html += righe || '<div class="popup-empty">Nessun piatto selezionato</div>';
  });
  body.innerHTML = html;
  document.getElementById('popup-overlay').classList.add('show');
};

window._chiudiPopup = function() {
  document.getElementById('popup-overlay').classList.remove('show');
};

// Chiudi popup toccando l'overlay
document.getElementById('popup-overlay').addEventListener('click', function(e) {
  if (e.target === this) window._chiudiPopup();
});

// Esponi funzioni globali (chiamate da onclick inline)
window._step = function(p, k, delta) {
  if (!comanda[p]) comanda[p] = {};
  // Per le variazioni (v1, v2) blocca + se non è stato scelto un nome
  if ((k === 'v1' || k === 'v2') && delta > 0 && !comanda[p][k+'_nome']) {
    const sel = document.getElementById(`sel-${p}-${k}`);
    if (sel) sel.style.borderColor = 'var(--oro)';
    setTimeout(() => { if(sel) sel.style.borderColor = ''; }, 1000);
    return;
  }
  comanda[p][k] = Math.max(0, (comanda[p][k] || 0) + delta);
  // GF non può superare il totale
  if ((comanda[p][k+'_gf'] || 0) > comanda[p][k]) {
    comanda[p][k+'_gf'] = comanda[p][k];
    const elGf = document.getElementById(`val-${p}-${k}-gf`);
    if (elGf) elGf.textContent = comanda[p][k+'_gf'];
  }
  const el = document.getElementById(`val-${p}-${k}`);
  if (el) el.textContent = comanda[p][k];
  const card = document.getElementById(`card-${p}-${k}`);
  if (card) {
    if (comanda[p][k] > 0) card.classList.add('selected');
    else card.classList.remove('selected');
  }
  aggiornaRiepilogo(p);
};

window._stepGf = function(p, k, delta) {
  if (!comanda[p]) comanda[p] = {};
  const max = comanda[p][k] || 0; // GF non può superare il totale del piatto
  comanda[p][k+'_gf'] = Math.min(max, Math.max(0, (comanda[p][k+'_gf'] || 0) + delta));
  const el = document.getElementById(`val-${p}-${k}-gf`);
  if (el) el.textContent = comanda[p][k+'_gf'];
  aggiornaRiepilogo(p);
};

// Scelta variazione dal select
window._scegliVar = function(p, num, nome) {
  if (!comanda[p]) comanda[p] = {};
  comanda[p][`v${num}_nome`] = nome;
  // Se si deseleziona, azzera anche il contatore
  if (!nome) comanda[p][`v${num}`] = 0;
  const el = document.getElementById(`val-${p}-v${num}`);
  if (el) el.textContent = comanda[p][`v${num}`] || 0;
  const card = document.getElementById(`card-${p}-v${num}`);
  if (card) {
    if ((comanda[p][`v${num}`] || 0) > 0 && nome) card.classList.add('selected');
    else card.classList.remove('selected');
  }
  aggiornaRiepilogo(p);
};

window._conferma = async function() {
  const btn = document.getElementById('btn-conferma-ok');
  btn.disabled = true;
  btn.textContent = 'Invio in corso...';

  const dataKey = (menu?.data || dataOggi()).replace(/-/g,'');
  const payload = {
    camera,
    data: menu?.data || dataOggi(),
    pranzo: comanda.pranzo || {},
    cena:   comanda.cena   || {},
    timestamp: Date.now(),
    confermata: true
  };

  try {
    await set(ref(db, `comande/${dataKey}/${camera}`), payload);
    window._chiudiPopup();
    mostraSuccesso(false);
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Invia comanda';
    alert('Errore di rete. Riprova.');
  }
};

window._modifica = function() {
  // Il pulsante modifica non è visibile — lo sblocco avviene solo dal gestionale
  // Questa funzione non fa nulla, il pulsante è nascosto nel successo
};

function mostraSuccesso(gia) {
  document.getElementById('content').style.display = 'none';
  document.getElementById('footer-bar').style.display = 'none';
  document.getElementById('successo').classList.add('show');
  document.getElementById('successo-msg').textContent = gia
    ? 'Comanda già inviata per oggi.'
    : 'La tua comanda è stata inviata alla cucina.';
}

function showPasto(p) {
  document.querySelectorAll('.pasto-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.pasto-panel').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + p).classList.add('active');
  document.getElementById('panel-' + p).classList.add('active');
}
window._showPasto = showPasto;

// ── INIT ────────────────────────────────────────────────────
async function init() {
  const snap = await get(ref(db, 'menu_oggi'));
  if (snap.exists()) {
    menu = snap.val();
  }
  renderMenu();
  showPasto('pranzo');
}

init().catch(e => {
  document.getElementById('loading').style.display = 'none';
  const err = document.getElementById('error-box');
  err.textContent = 'Impossibile caricare il menu. Verifica la connessione.';
  err.classList.add('show');
  console.error(e);
});

</script>
