<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Comande Pranzo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #fff; font-family: 'Montserrat', sans-serif; padding: 8mm; }

  .griglia-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 1.5px solid #222;
    padding-bottom: 4px;
    margin-bottom: 6px;
  }

  .griglia-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #000;
  }

  .griglia-date {
    font-family: 'Montserrat', sans-serif;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #555;
  }

  .hotel-block { margin-bottom: 6px; }

  .hotel-title {
    font-family: 'Montserrat', sans-serif;
    font-size: 8px;
    font-weight: 500;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #000;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }

  .hotel-title-hr { flex: 1; height: 1px; background: #222; }

  .hotel-separator { height: 2px; background: #222; margin: 6px 0; }

  table {
    border-collapse: collapse;
    width: 100%;
    table-layout: fixed;
  }

  .th-piatto {
    background: #222;
    color: #fff;
    text-align: left;
    padding: 4px 6px;
    font-family: 'Montserrat', sans-serif;
    font-size: 7.5px;
    letter-spacing: 0.04em;
    border: 1px solid #333;
    white-space: nowrap;
    width: 100px;
  }

  .th-cam {
    background: #222;
    color: #fff;
    text-align: center;
    padding: 4px 1px;
    font-family: 'Montserrat', sans-serif;
    font-size: 6.5px;
    border: 1px solid #333;
  }

  .td-piatto {
    font-family: 'Montserrat', sans-serif;
    font-size: 7.5px;
    padding: 2px 6px;
    border: 1px solid #ddd;
    background: #fafafa;
    white-space: nowrap;
    color: #222;
  }

  .td-data {
    border: 1px solid #ccc;
    height: 16px;
    background: #fff;
  }

  .td-empty {
    border: 1px solid #eee;
    background: #f8f8f8;
  }

  .row-section td {
    background: #333;
    color: #fff;
    font-family: 'Montserrat', sans-serif;
    font-size: 6.5px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 2px 6px;
    border: 1px solid #444;
  }

  .row-var .td-piatto {
    background: #f5f5f5;
    color: #999;
    font-style: italic;
    font-size: 7px;
  }

  .row-var .td-data { background: #f5f5f5; border-color: #ddd; }
  .row-var .td-empty { background: #f5f5f5; border-color: #eee; }

  @media print {
    @page { size: A4 landscape; margin: 8mm; }
    body { padding: 0; }
  }
</style>
</head>
<body>

  <div class="griglia-header">
    <div class="griglia-title">Comande Pranzo</div>
    <div style="display:flex;align-items:center;gap:16px;">
      <div id="n-comande" style="font-size:8px;letter-spacing:0.15em;text-transform:uppercase;color:#27ae60;font-family:'Montserrat',sans-serif;"></div>
      <div id="ultimo-aggiornamento" style="font-size:8px;letter-spacing:0.12em;text-transform:uppercase;color:#aaa;font-family:'Montserrat',sans-serif;"></div>
      <div style="display:flex;align-items:center;gap:5px;">
        <div style="width:7px;height:7px;border-radius:50%;background:#27ae60;animation:pulse 1.5s infinite;"></div>
        <div style="font-size:8px;letter-spacing:0.15em;text-transform:uppercase;color:#27ae60;font-family:'Montserrat',sans-serif;">Live</div>
      </div>
      <div class="griglia-date" id="data-oggi"></div>
    </div>
  </div>
  <style>
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  </style>

  <div class="hotel-block">
    <div class="hotel-title">Hotel Canguro<div class="hotel-title-hr"></div></div>
    <table id="table-canguro"></table>
  </div>

  <div class="hotel-separator"></div>

  <div class="hotel-block">
    <div class="hotel-title">Hotel La Sfinge<div class="hotel-title-hr"></div></div>
    <table id="table-sfinge"></table>
  </div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ── CONFIGURAZIONE FIREBASE ──────────────────────────────────
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyC40uKHHAG4HjBzRZdVdRqLyxDDKjELM0g",
  authDomain: "hotel-canguro.firebaseapp.com",
  databaseURL: "https://hotel-canguro-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "hotel-canguro",
  storageBucket: "hotel-canguro.firebasestorage.app",
  messagingSenderId: "790068611588",
  appId: "1:790068611588:web:5189509820eddc7d59c351"
};
// ────────────────────────────────────────────────────────────

// Data di oggi
const oggi = new Date();
const giorni = ['Domenica','Lunedi','Martedi','Mercoledi','Giovedi','Venerdi','Sabato'];
const mesi = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
document.getElementById('data-oggi').textContent = `${giorni[oggi.getDay()]} ${oggi.getDate()} ${mesi[oggi.getMonth()]} ${oggi.getFullYear()}`;

const dataKey = oggi.toISOString().split('T')[0].replace(/-/g,'');

const camereCanguro = [101,102,103,104,105,106,107,108,109,201,202,203,204,205,206,207,208,209,301,302,303,304,305,306,307,308,309,401,402,403,404,405,406,407,408,409];
const camereSfinge  = [501,502,503,504,505,506,507,601,602,603,604,605,606,607,701,702,703,704,705,706,707,801,802];

// Mappa: chiave Firebase → indice riga nella tabella
// Le righe piatto avranno data-key="p_p1" ecc.
// Le righe var avranno data-varkey="pranzo_p" ecc.

let menuOggi = {}; // menu_oggi da Firebase
let comande  = {}; // comande/{dataKey}

// ── BUILD TABLE ─────────────────────────────────────────────
function buildTable(tableId, camere) {
  const table = document.getElementById(tableId);
  table.innerHTML = '';

  // Header camere
  const trCam = document.createElement('tr');
  const thLabel = document.createElement('th');
  thLabel.className = 'th-piatto';
  thLabel.textContent = 'Camera';
  trCam.appendChild(thLabel);
  camere.forEach(cam => {
    const th = document.createElement('th');
    th.className = 'th-cam';
    th.textContent = cam;
    trCam.appendChild(th);
  });
  table.appendChild(trCam);

  // Struttura righe: per pranzo e cena
  const struttura = [
    // PRANZO
    { tipo: 'section', label: 'Pranzo — Primi piatti' },
    { tipo: 'piatto',  pasto: 'pranzo', corso: 'p', num: 1, chiave: 'pranzo_p1' },
    { tipo: 'piatto',  pasto: 'pranzo', corso: 'p', num: 2, chiave: 'pranzo_p2' },
    { tipo: 'piatto',  pasto: 'pranzo', corso: 'p', num: 3, chiave: 'pranzo_p3' },
    { tipo: 'var',     pasto: 'pranzo', label: 'Variazione pranzo' },
    { tipo: 'section', label: 'Pranzo — Secondi piatti' },
    { tipo: 'piatto',  pasto: 'pranzo', corso: 's', num: 1, chiave: 'pranzo_s1' },
    { tipo: 'piatto',  pasto: 'pranzo', corso: 's', num: 2, chiave: 'pranzo_s2' },
    { tipo: 'piatto',  pasto: 'pranzo', corso: 's', num: 3, chiave: 'pranzo_s3' },
    { tipo: 'var',     pasto: 'pranzo', label: 'Variazione pranzo secondi' },
    // CENA
    { tipo: 'section', label: 'Cena — Primi piatti' },
    { tipo: 'piatto',  pasto: 'cena',   corso: 'p', num: 1, chiave: 'cena_p1' },
    { tipo: 'piatto',  pasto: 'cena',   corso: 'p', num: 2, chiave: 'cena_p2' },
    { tipo: 'piatto',  pasto: 'cena',   corso: 'p', num: 3, chiave: 'cena_p3' },
    { tipo: 'var',     pasto: 'cena',   label: 'Variazione cena' },
    { tipo: 'section', label: 'Cena — Secondi piatti' },
    { tipo: 'piatto',  pasto: 'cena',   corso: 's', num: 1, chiave: 'cena_s1' },
    { tipo: 'piatto',  pasto: 'cena',   corso: 's', num: 2, chiave: 'cena_s2' },
    { tipo: 'piatto',  pasto: 'cena',   corso: 's', num: 3, chiave: 'cena_s3' },
    { tipo: 'var',     pasto: 'cena',   label: 'Variazione cena secondi' },
  ];

  struttura.forEach(p => {
    const tr = document.createElement('tr');
    if (p.tipo === 'section') {
      tr.className = 'row-section';
      const td = document.createElement('td');
      td.colSpan = camere.length + 1;
      td.textContent = p.label;
      tr.appendChild(td);
    } else if (p.tipo === 'var') {
      tr.className = 'row-var';
      const tdP = document.createElement('td');
      tdP.className = 'td-piatto';
      tdP.textContent = p.label;
      tr.appendChild(tdP);
      camere.forEach(cam => {
        const td = document.createElement('td');
        td.className = 'td-data td-var';
        td.id = `var-${tableId}-${cam}-${p.pasto}`;
        td.style.fontSize = '6px';
        td.style.padding = '1px 3px';
        td.style.color = '#888';
        tr.appendChild(td);
      });
    } else {
      // riga piatto con totale
      const tdP = document.createElement('td');
      tdP.className = 'td-piatto';
      // Nome piatto dal menu
      const nomeMenu = menuOggi[p.pasto + '_' + (p.corso==='p'?'p':'s') + p.num] || p.chiave;
      tdP.textContent = nomeMenu;
      tdP.id = `label-${tableId}-${p.chiave}`;
      tr.appendChild(tdP);
      camere.forEach(cam => {
        const td = document.createElement('td');
        td.className = 'td-data';
        td.id = `cell-${tableId}-${cam}-${p.chiave}`;
        td.style.textAlign = 'center';
        td.style.fontWeight = '600';
        td.style.fontSize = '8px';
        tr.appendChild(td);
      });
      // Riga TOTALE
      tr.dataset.chiave = p.chiave;
      tr.dataset.tableId = tableId;
    }
    table.appendChild(tr);
  });

  // Aggiungi riga TOTALE in fondo a ogni gruppo piatti
  aggiungiRigaTotale(table, camere, tableId);
}

function aggiungiRigaTotale(table, camere, tableId) {
  // Inserisce una riga totale per ogni piatto alla fine
  // (lo facciamo semplicemente aggiornando i valori nelle celle)
}

// ── AGGIORNA CELLE DA FIREBASE ───────────────────────────────
function aggiornaCelle(tableId, camere) {
  const chiavi = ['pranzo_p1','pranzo_p2','pranzo_p3','pranzo_s1','pranzo_s2','pranzo_s3',
                  'cena_p1','cena_p2','cena_p3','cena_s1','cena_s2','cena_s3'];

  // Aggiorna nomi piatti dal menu
  chiavi.forEach(k => {
    const el = document.getElementById(`label-${tableId}-${k}`);
    if (el) {
      // chiave tipo 'pranzo_p1' → menuOggi['pranzo_p1']
      const nome = menuOggi[k] || k;
      el.textContent = nome;
    }
  });

  // Per ogni camera, aggiorna i valori
  camere.forEach(cam => {
    const camStr = String(cam);
    const camData = comande[camStr] || null;

    chiavi.forEach(k => {
      const cell = document.getElementById(`cell-${tableId}-${cam}-${k}`);
      if (!cell) return;

      let val = 0;
      if (camData) {
        // La struttura Firebase: comande/{dataKey}/{camera}/{pranzo|cena}/{p1|p2|...}
        const [pasto, campo] = k.split('_'); // es. 'pranzo','p1'
        val = camData[pasto]?.[campo] || 0;
      }
      if (val > 0) {
        cell.textContent = val;
        cell.style.background = '#e8f5e9';
        cell.style.color = '#2e7d32';
      } else {
        cell.textContent = '';
        cell.style.background = '#fff';
        cell.style.color = '#222';
      }
    });

    // Variazioni
    ['pranzo','cena'].forEach(pasto => {
      const varCell = document.getElementById(`var-${tableId}-${cam}-${pasto}`);
      if (!varCell) return;
      const nota = camData?.[pasto]?.var || '';
      if (nota) {
        varCell.textContent = nota;
        varCell.title = nota;
        varCell.style.background = '#fff8e1';
      } else {
        varCell.textContent = '';
        varCell.style.background = '';
      }
    });
  });

  // Indicatore ultimo aggiornamento
  const now = new Date();
  const ts = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
  const el = document.getElementById('ultimo-aggiornamento');
  if (el) el.textContent = `Ultimo aggiornamento: ${ts}`;
}

// ── INIT FIREBASE ────────────────────────────────────────────
const fbApp = initializeApp(FIREBASE_CONFIG);
const fbDb  = getDatabase(fbApp);

// Ascolta menu_oggi
onValue(ref(fbDb, 'menu_oggi'), snap => {
  menuOggi = snap.exists() ? snap.val() : {};
  buildTable('table-canguro', camereCanguro);
  buildTable('table-sfinge',  camereSfinge);
  aggiornaCelle('table-canguro', camereCanguro);
  aggiornaCelle('table-sfinge',  camereSfinge);
});

// Ascolta comande di oggi in REALTIME
onValue(ref(fbDb, `comande/${dataKey}`), snap => {
  comande = snap.exists() ? snap.val() : {};
  aggiornaCelle('table-canguro', camereCanguro);
  aggiornaCelle('table-sfinge',  camereSfinge);

  // Aggiorna contatore comande ricevute
  const n = Object.keys(comande).length;
  const el = document.getElementById('n-comande');
  if (el) el.textContent = `${n} comand${n===1?'a':'e'} ricevut${n===1?'a':'e'}`;
});
</script>
</body>
</html>
