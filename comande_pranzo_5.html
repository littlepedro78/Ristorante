<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Comande Pranzo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f0f0f0; font-family: 'Montserrat', sans-serif; }

  /* ── TOOLBAR (solo schermo) ── */
  .toolbar {
    background: #fff; border-bottom: 1px solid #ddd;
    padding: 10px 16px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  }
  .toolbar-title {
    font-family: 'Cormorant Garamond', serif; font-size: 18px;
    letter-spacing: 0.12em; text-transform: uppercase; color: #000; flex: 1;
  }
  .live-badge { display: flex; align-items: center; gap: 5px; font-size: 8px; letter-spacing: 0.15em; text-transform: uppercase; color: #27ae60; }
  .live-dot   { width: 7px; height: 7px; border-radius: 50%; background: #27ae60; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  #n-comande  { font-size: 8px; letter-spacing: 0.15em; text-transform: uppercase; color: #27ae60; }
  #ultimo-agg { font-size: 8px; letter-spacing: 0.12em; text-transform: uppercase; color: #aaa; }

  .btn-stampa {
    background: #222; color: #fff; border: none; padding: 8px 16px;
    font-family: 'Montserrat', sans-serif; font-size: 9px; letter-spacing: 0.2em;
    text-transform: uppercase; cursor: pointer; transition: background 0.15s; white-space: nowrap;
  }
  .btn-stampa:hover { background: #444; }
  .btn-stampa.outline { background: #fff; color: #222; border: 1px solid #222; }
  .btn-stampa.outline:hover { background: #f5f5f5; }

  /* ── FOGLIO ── */
  .foglio {
    background: #fff;
    padding: 7mm 8mm;
    margin: 16px auto;
    width: 297mm;
    /* In schermo mostra a grandezza reale */
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .foglio-header {
    display: flex; justify-content: space-between; align-items: baseline;
    border-bottom: 1.5px solid #000; padding-bottom: 3px; margin-bottom: 4px;
  }
  .foglio-title {
    font-family: 'Cormorant Garamond', serif; font-size: 15px; font-weight: 400;
    letter-spacing: 0.12em; text-transform: uppercase; color: #000;
  }
  .foglio-hotel {
    font-family: 'Montserrat', sans-serif; font-size: 7.5px; font-weight: 700;
    letter-spacing: 0.3em; text-transform: uppercase; color: #000; margin-top: 1px;
  }
  .foglio-date {
    font-family: 'Montserrat', sans-serif; font-size: 8px;
    letter-spacing: 0.15em; text-transform: uppercase; color: #000;
  }

  /* ── TABELLA ──
     A4 landscape utile: ~283 × 196mm
     Header foglio occupa ~12mm → tabella ha ~184mm di altezza
     28 righe totali (1 header + 4 section + 12 piatti + 12 var) → ~6.5mm a riga
  */
  table {
    border-collapse: collapse;
    width: 100%;
    table-layout: fixed;
    /* Forza la tabella a occupare tutta l'altezza disponibile nel foglio */
    height: calc(196mm - 14mm); /* altezza utile meno header foglio */
  }

  .th-piatto {
    background: #fff; color: #000; text-align: left; padding: 2px 5px;
    font-family: 'Montserrat', sans-serif; font-size: 7px; font-weight: 700; letter-spacing: 0.04em;
    border: 1px solid #000; width: 82px; min-width: 82px; white-space: nowrap;
  }
  .th-cam {
    background: #fff; color: #000; border: 1px solid #000;
    padding: 0; text-align: center; vertical-align: bottom; height: 52px;
  }
  .th-cam span {
    display: inline-block;
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    font-family: 'Montserrat', sans-serif;
    font-size: 9px; font-weight: 700;
    padding: 4px 0; color: #000; letter-spacing: 0.05em;
  }

  /* Nome piatto: va a capo, non tronca */
  .td-piatto {
    font-family: 'Montserrat', sans-serif; font-size: 8.5px; font-weight: 700; padding: 1px 4px;
    border: 1px solid #000; background: #fff; color: #000;
    white-space: normal; word-break: break-word; line-height: 1.3; vertical-align: middle;
  }
  .td-data {
    border: 1px solid #000; background: #fff;
    text-align: center; font-weight: 700; vertical-align: middle;
    color: #000;
    font-size: clamp(8px, 1.8vw, 14px);
    line-height: 1;
  }

  .td-data {
    border: 1px solid #000; background: #fff;
    text-align: center; font-weight: 700; vertical-align: middle;
    color: #000;
    font-size: clamp(8px, 1.8vw, 14px);
    line-height: 1;
    height: 20px;
    min-height: 20px;
  }
  .row-section td {
    background: #000; color: #fff; font-family: 'Montserrat', sans-serif;
    font-size: 6.5px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase;
    padding: 2px 5px; border: 1px solid #000; height: 10px;
  }

  /* Righe variazione: identiche alle righe dati, nessuna scritta */
  .row-var .td-piatto {
    background: #fff; color: #fff; font-size: 6px;
    border: 1px solid #000;
  }
  .row-var .td-data { background: #fff; border: 1px solid #000; }

  /* Valore da Firebase */
  .has-val  { outline: 1.5px solid #000; font-weight: 900 !important; color: #000 !important; background: #fff !important; }
  .has-nota { font-size: 5px !important; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #000 !important; background: #fff !important; font-style: italic; }

  /* ── PRINT ── */
  @media print {
    @page { size: A4 landscape; margin: 0; }
    body  { background: #fff; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .toolbar { display: none !important; }
    .foglio {
      margin: 0;
      padding: 7mm 8mm;
      width: 100%;
      height: 210mm;           /* esattamente un A4 landscape */
      page-break-after: always;
      page-break-inside: avoid;
      box-shadow: none;
      display: flex;
      flex-direction: column;
    }
    .foglio:last-child { page-break-after: auto; }
    table {
      flex: 1;                 /* la tabella occupa tutto lo spazio rimanente */
      height: auto;
    }
    /* Forza nero puro */
    .th-piatto, .th-cam, .row-section td { background: #000 !important; color: #fff !important; }
    .td-piatto, .td-data { border-color: #000 !important; }
  }
</style>
</head>
<body>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="toolbar-title">Comande Pranzo &amp; Cena</div>
  <div id="data-oggi"></div>
  <div id="n-comande"></div>
  <div id="ultimo-agg"></div>
  <div class="live-badge"><div class="live-dot"></div>Live</div>
  <button class="btn-stampa outline" onclick="stampaSolo('canguro')">🖨 Stampa Canguro</button>
  <button class="btn-stampa outline" onclick="stampaSolo('sfinge')">🖨 Stampa Sfinge</button>
  <button class="btn-stampa" onclick="window.print()">🖨 Stampa Entrambi</button>
</div>

<!-- FOGLIO CANGURO -->
<div class="foglio" id="foglio-canguro">
  <div class="foglio-header">
    <div>
      <div class="foglio-title">Comande Pranzo &amp; Cena</div>
      <div class="foglio-hotel">Hotel Canguro</div>
    </div>
    <div class="foglio-date" id="data-canguro"></div>
  </div>
  <table id="table-canguro"></table>
</div>

<!-- FOGLIO SFINGE -->
<div class="foglio" id="foglio-sfinge">
  <div class="foglio-header">
    <div>
      <div class="foglio-title">Comande Pranzo &amp; Cena</div>
      <div class="foglio-hotel">Hotel La Sfinge</div>
    </div>
    <div class="foglio-date" id="data-sfinge"></div>
  </div>
  <table id="table-sfinge"></table>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ── CONFIGURAZIONE FIREBASE ──────────────────────────────────
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyC40uKHHAG4HjBzRZdVdRqLyxDDKjELM0g",
  authDomain:        "hotel-canguro.firebaseapp.com",
  databaseURL:       "https://hotel-canguro-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "hotel-canguro",
  storageBucket:     "hotel-canguro.firebasestorage.app",
  messagingSenderId: "790068611588",
  appId:             "1:790068611588:web:5189509820eddc7d59c351"
};
// ────────────────────────────────────────────────────────────

const camereCanguro = [101,102,103,104,105,106,108,109,201,202,203,204,205,206,208,209,301,302,303,304,305,306,307,308,309,401,402,403,404,405,406,407,408];
const camereSfinge  = [501,502,503,504,505,506,507,601,602,603,604,605,606,607,701,702,703,704,705,706,707,801,802];

// 5 righe variazione per ogni sezione (primo/secondo × pranzo/cena)
const STRUTTURA = [
  { tipo:'section', label:'Pranzo — Primi piatti' },
  { tipo:'piatto',  pasto:'pranzo', corso:'p', num:1, chiave:'pranzo_p1' },
  { tipo:'piatto',  pasto:'pranzo', corso:'p', num:2, chiave:'pranzo_p2' },
  { tipo:'piatto',  pasto:'pranzo', corso:'p', num:3, chiave:'pranzo_p3' },
  { tipo:'var', pasto:'pranzo', corso:'p', idx:1 },
  { tipo:'var', pasto:'pranzo', corso:'p', idx:2 },
  { tipo:'var', pasto:'pranzo', corso:'p', idx:3 },
  { tipo:'var', pasto:'pranzo', corso:'p', idx:4 },
  { tipo:'var', pasto:'pranzo', corso:'p', idx:5 },

  { tipo:'section', label:'Pranzo — Secondi piatti' },
  { tipo:'piatto',  pasto:'pranzo', corso:'s', num:1, chiave:'pranzo_s1' },
  { tipo:'piatto',  pasto:'pranzo', corso:'s', num:2, chiave:'pranzo_s2' },
  { tipo:'piatto',  pasto:'pranzo', corso:'s', num:3, chiave:'pranzo_s3' },
  { tipo:'var', pasto:'pranzo', corso:'s', idx:1 },
  { tipo:'var', pasto:'pranzo', corso:'s', idx:2 },
  { tipo:'var', pasto:'pranzo', corso:'s', idx:3 },
  { tipo:'var', pasto:'pranzo', corso:'s', idx:4 },
  { tipo:'var', pasto:'pranzo', corso:'s', idx:5 },

  { tipo:'section', label:'Cena — Primi piatti' },
  { tipo:'piatto',  pasto:'cena', corso:'p', num:1, chiave:'cena_p1' },
  { tipo:'piatto',  pasto:'cena', corso:'p', num:2, chiave:'cena_p2' },
  { tipo:'piatto',  pasto:'cena', corso:'p', num:3, chiave:'cena_p3' },
  { tipo:'var', pasto:'cena', corso:'p', idx:1 },
  { tipo:'var', pasto:'cena', corso:'p', idx:2 },
  { tipo:'var', pasto:'cena', corso:'p', idx:3 },
  { tipo:'var', pasto:'cena', corso:'p', idx:4 },
  { tipo:'var', pasto:'cena', corso:'p', idx:5 },

  { tipo:'section', label:'Cena — Secondi piatti' },
  { tipo:'piatto',  pasto:'cena', corso:'s', num:1, chiave:'cena_s1' },
  { tipo:'piatto',  pasto:'cena', corso:'s', num:2, chiave:'cena_s2' },
  { tipo:'piatto',  pasto:'cena', corso:'s', num:3, chiave:'cena_s3' },
  { tipo:'var', pasto:'cena', corso:'s', idx:1 },
  { tipo:'var', pasto:'cena', corso:'s', idx:2 },
  { tipo:'var', pasto:'cena', corso:'s', idx:3 },
  { tipo:'var', pasto:'cena', corso:'s', idx:4 },
  { tipo:'var', pasto:'cena', corso:'s', idx:5 },
];

let menuOggi = {};
let comande  = {};

// Data
const oggi = new Date();
const G = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
const M = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const dataStr = `${G[oggi.getDay()]} ${oggi.getDate()} ${M[oggi.getMonth()]} ${oggi.getFullYear()}`;
const dataKey = oggi.toISOString().split('T')[0].replace(/-/g,'');

document.getElementById('data-oggi').textContent    = dataStr;
document.getElementById('data-canguro').textContent = dataStr;
document.getElementById('data-sfinge').textContent  = dataStr;

// ── BUILD TABLE ─────────────────────────────────────────────
function buildTable(tableId, camere) {
  const table = document.getElementById(tableId);
  table.innerHTML = '';

  // Riga header
  const trHead = document.createElement('tr');
  const thLbl  = document.createElement('th');
  thLbl.className = 'th-piatto';
  thLbl.textContent = 'Piatto \\ Camera';
  trHead.appendChild(thLbl);
  camere.forEach(cam => {
    const th = document.createElement('th');
    th.className = 'th-cam';
    const span = document.createElement('span');
    span.textContent = cam;
    th.appendChild(span);
    trHead.appendChild(th);
  });
  table.appendChild(trHead);

  // Righe struttura
  STRUTTURA.forEach(p => {
    const tr = document.createElement('tr');

    if (p.tipo === 'section') {
      tr.className = 'row-section';
      const td = document.createElement('td');
      td.colSpan = camere.length + 1;
      td.textContent = p.label;
      tr.appendChild(td);

    } else if (p.tipo === 'var') {
      tr.className = 'row-var';
      const tdP = document.createElement('td');
      tdP.className = 'td-piatto';
      // cella sinistra vuota — appare come riga bianca uguale alle altre
      tr.appendChild(tdP);
      camere.forEach(cam => {
        const td = document.createElement('td');
        td.className = 'td-data';
        // Solo idx=1 riceve la nota digitale dal cliente; le altre sono righe bianche per scrittura a mano
        if (p.idx === 1) {
          td.className += ' td-var-firebase';
          td.id = `var-${tableId}-${cam}-${p.pasto}-${p.corso}`;
        }
        tr.appendChild(td);
      });

    } else {
      // Riga piatto
      const tdP = document.createElement('td');
      tdP.className = 'td-piatto';
      tdP.id = `label-${tableId}-${p.chiave}`;
      tdP.textContent = menuOggi[p.chiave] || '—';
      tr.appendChild(tdP);
      camere.forEach(cam => {
        const td = document.createElement('td');
        td.className = 'td-data';
        td.id = `cell-${tableId}-${cam}-${p.chiave}`;
        tr.appendChild(td);
      });
    }

    table.appendChild(tr);
  });
}

// ── AGGIORNA CELLE ───────────────────────────────────────────
function aggiornaCelle(tableId, camere) {
  const chiavi = [
    'pranzo_p1','pranzo_p2','pranzo_p3','pranzo_s1','pranzo_s2','pranzo_s3',
    'cena_p1','cena_p2','cena_p3','cena_s1','cena_s2','cena_s3'
  ];

  // Nomi piatti fissi
  chiavi.forEach(k => {
    const el = document.getElementById(`label-${tableId}-${k}`);
    if (el) el.textContent = menuOggi[k] || '—';
  });

  // Valori piatti fissi per camera
  camere.forEach(cam => {
    const camData = comande[String(cam)] || null;
    chiavi.forEach(k => {
      const cell = document.getElementById(`cell-${tableId}-${cam}-${k}`);
      if (!cell) return;
      const [pasto, campo] = k.split('_');
      const val = camData?.[pasto]?.[campo] || 0;
      if (val > 0) {
        cell.textContent = val;
        cell.classList.add('has-val');
      } else {
        cell.textContent = '';
        cell.classList.remove('has-val');
      }
    });
  });

  // ── VARIAZIONI DINAMICHE ─────────────────────────────────────
  // Raccoglie tutte le variazioni ordinate dalle camere (v1, v2 per pranzo e cena)
  // Struttura: { 'pranzo_v1': { nomeVar: 'Pasta in bianco', totali: {101: 2, 203: 1} }, ... }
  const varRaccolte = {};

  camere.forEach(cam => {
    const camData = comande[String(cam)] || null;
    if (!camData) return;
    ['pranzo','cena'].forEach(pasto => {
      ['v1','v2'].forEach(vk => {
        const qty = camData?.[pasto]?.[vk] || 0;
        if (qty <= 0) return;
        // Il nome della variazione viene dal menu pubblicato
        const nomeVar = menuOggi?.[pasto+'_'+vk] || vk;
        const key = pasto + '_' + vk + '_' + nomeVar; // chiave univoca
        if (!varRaccolte[key]) {
          varRaccolte[key] = { pasto, vk, nomeVar, totali: {} };
        }
        varRaccolte[key].totali[cam] = qty;
      });
    });
  });

  // Aggiorna le righe var esistenti nella tabella
  // Le righe var hanno class 'row-var' e sono usate per scrivere a mano O per le variazioni digitali
  // Usiamo le prime N righe var per ogni sezione per mostrare le variazioni digitali
  const table = document.getElementById(tableId);
  if (!table) return;

  // Raggruppa variazioni per sezione (pranzo/cena)
  const varPerSezione = {
    pranzo: Object.values(varRaccolte).filter(v => v.pasto === 'pranzo'),
    cena:   Object.values(varRaccolte).filter(v => v.pasto === 'cena')
  };

  // Trova tutte le righe var della tabella e aggiorna quelle che hanno dati
  const tutteLeRigheVar = table.querySelectorAll('tr.row-var');
  // Resetta tutte le righe var
  tutteLeRigheVar.forEach(tr => {
    const tdPiatto = tr.querySelector('.td-piatto');
    if (tdPiatto) tdPiatto.textContent = '';
    tr.querySelectorAll('.td-data').forEach(td => {
      td.textContent = '';
      td.classList.remove('has-val');
      td.style.fontWeight = '';
    });
  });

  // Determina a quale sezione appartiene ogni riga var
  // Le righe var sono divise tra pranzo (prime) e cena (seconde)
  // Contiamo le righe section per capire il confine
  const rows = Array.from(table.rows);
  let sezioneCorrente = null;
  const righeVarPerSezione = { pranzo: [], cena: [] };

  rows.forEach(tr => {
    if (tr.classList.contains('row-section')) {
      const testo = tr.cells[0]?.textContent || '';
      if (testo.includes('Pranzo')) sezioneCorrente = 'pranzo';
      if (testo.includes('Cena'))   sezioneCorrente = 'cena';
    }
    if (tr.classList.contains('row-var') && sezioneCorrente) {
      righeVarPerSezione[sezioneCorrente].push(tr);
    }
  });

  // Riempie le righe var con le variazioni digitali
  ['pranzo','cena'].forEach(pasto => {
    const variazioni = varPerSezione[pasto];
    const righe = righeVarPerSezione[pasto];
    variazioni.forEach((varObj, i) => {
      if (i >= righe.length) return; // più variazioni che righe — scarta
      const tr = righe[i];
      const tdPiatto = tr.querySelector('.td-piatto');
      if (tdPiatto) {
        tdPiatto.textContent = varObj.nomeVar;
        tdPiatto.style.fontStyle = 'normal';
        tdPiatto.style.color = '#000';
      }
      // Riempie celle camera
      camere.forEach((cam, ci) => {
        const td = tr.cells[ci + 1]; // +1 per la colonna piatto
        if (!td) return;
        const qty = varObj.totali[cam] || 0;
        if (qty > 0) {
          td.textContent = qty;
          td.classList.add('has-val');
          td.style.fontWeight = '900';
        }
      });
    });
  });

  // Timestamp
  const now = new Date();
  const ts = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
  const el = document.getElementById('ultimo-agg');
  if (el) el.textContent = `Aggiornato: ${ts}`;
}

// ── STAMPA ───────────────────────────────────────────────────
window.stampaSolo = function(quale) {
  const c = document.getElementById('foglio-canguro');
  const s = document.getElementById('foglio-sfinge');
  if (quale === 'canguro') { s.style.display = 'none'; }
  else                      { c.style.display = 'none'; }
  window.print();
  setTimeout(() => { c.style.display = ''; s.style.display = ''; }, 600);
};

// ── BUILD IMMEDIATO (griglia visibile subito, anche senza Firebase) ──
buildTable('table-canguro', camereCanguro);
buildTable('table-sfinge',  camereSfinge);

// ── FIREBASE (opzionale — se non configurato la griglia resta visibile) ──
const credenzialiFake = FIREBASE_CONFIG.apiKey === 'INSERISCI_API_KEY';

if (credenzialiFake) {
  // Mostra avviso discreto ma non blocca
  const el = document.getElementById('ultimo-agg');
  if (el) el.textContent = 'Firebase non configurato — modalità offline';
} else {
  try {
    const fbApp = initializeApp(FIREBASE_CONFIG);
    const fbDb  = getDatabase(fbApp);

    onValue(ref(fbDb, 'menu_oggi'), snap => {
      menuOggi = snap.exists() ? snap.val() : {};
      // Ricostruisce le tabelle con i nomi piatti reali
      buildTable('table-canguro', camereCanguro);
      buildTable('table-sfinge',  camereSfinge);
      aggiornaCelle('table-canguro', camereCanguro);
      aggiornaCelle('table-sfinge',  camereSfinge);
    }, err => {
      console.warn('Firebase menu_oggi:', err.message);
    });

    onValue(ref(fbDb, `comande/${dataKey}`), snap => {
      comande = snap.exists() ? snap.val() : {};
      aggiornaCelle('table-canguro', camereCanguro);
      aggiornaCelle('table-sfinge',  camereSfinge);
      const n  = Object.keys(comande).length;
      const el = document.getElementById('n-comande');
      if (el) el.textContent = n > 0 ? `${n} comand${n===1?'a':'e'} ricevut${n===1?'a':'e'}` : '';
    }, err => {
      console.warn('Firebase comande:', err.message);
    });

  } catch(e) {
    console.warn('Firebase init fallito:', e.message);
    const el = document.getElementById('ultimo-agg');
    if (el) el.textContent = 'Errore Firebase — modalità offline';
  }
}
</script>
</body>
</html>
